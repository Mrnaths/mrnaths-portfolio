<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Mr Naths Concept Admin</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

body{
    background:#f4f6f9;
    color:#333;
    overflow-x:hidden;
}

header{
    background:#5B1020;
    color:#fff;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

header h1{
    font-size:28px;
    font-weight:600;
}

.container{
    width:min(1200px,92%);
    margin:35px auto;
}

button{
    border:none;
    cursor:pointer;
    transition:.3s;
    border-radius:8px;
}

#logoutBtn{
    background:#FFD166;
    color:#5B1020;
    padding:12px 22px;
    font-weight:600;
}

#logoutBtn:hover{
    transform:translateY(-2px);
}

.stats{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

    margin-bottom:35px;

}

.stat-card{

    background:#fff;

    padding:30px;

    border-radius:15px;

    text-align:center;

    box-shadow:0 8px 25px rgba(0,0,0,.08);

}

.stat-card h3{

    color:#5B1020;

    font-size:42px;

    margin-bottom:10px;

}

.stat-card p{

    color:#777;

}

.dashboard{

    display:grid;

    grid-template-columns:380px 1fr;

    gap:30px;

}

.card{

    background:#fff;

    padding:25px;

    border-radius:15px;

    box-shadow:0 8px 25px rgba(0,0,0,.08);

}

.card h2{

    color:#5B1020;

    margin-bottom:20px;

}

input,
textarea,
select{

    width:100%;

    padding:14px;

    margin-bottom:15px;

    border:1px solid #ddd;

    border-radius:8px;

    font-size:15px;

}

textarea{

    resize:vertical;

    min-height:140px;

}

input[type=file]{

    padding:8px;

}

button:not(#logoutBtn){

    width:100%;

    padding:15px;

    background:#5B1020;

    color:#fff;

    font-size:15px;

}

button:not(#logoutBtn):hover{

    background:#74162d;

}

#preview{

    width:100%;

    min-height:250px;

    border:2px dashed #ccc;

    border-radius:12px;

    display:flex;

    align-items:center;

    justify-content:center;

    background:#fafafa;

    overflow:hidden;

    padding:10px;

    margin-bottom:20px;

}

#previewImage{

    max-width:100%;

    max-height:350px;

    width:auto;

    height:auto;

    object-fit:contain;

    display:none;

}

#previewText{

    color:#888;

}

#status{

    text-align:center;

    margin-top:15px;

    font-weight:600;

}

.gallery{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(280px,1fr));

    gap:20px;

}

.project{

    background:#fff;

    border-radius:15px;

    overflow:hidden;

    box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.project img{

    width:100%;

    height:220px;

    object-fit:cover;

}

.project-content{

    padding:18px;

}

.project-content h3{

    color:#5B1020;

    margin-bottom:8px;

}

.project-content p{

    margin-bottom:10px;

    font-size:14px;

}

.editBtn{

    background:#5B1020;

}

.deleteBtn{

    background:#d32f2f;

}

.section-title{

    color:#5B1020;

    margin:50px 0 20px;

}

.message-filters{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.filter-btn{
    width:auto;
    padding:10px 20px;
    background:#e5e5e5;
    color:#333;
    border:none;
    border-radius:30px;
    font-weight:600;
}

.filter-btn.active,
.filter-btn:hover{
    background:#5B1020;
    color:#fff;
}

#messages{
    display:grid;
    gap:20px;
    margin-bottom:50px;
}

.message-card{
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.message-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:15px;
}

.status{
    color:#fff;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
}

.status.new{
    background:#ff9800;
}

.status.read{
    background:#2196f3;
}

.status.replied{
    background:#4caf50;
}

.message-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:20px;
}

.message-actions button{
    width:auto;
}

.markRead{
    background:#2196f3;
}

.markReplied{
    background:#4caf50;
}

.deleteMessage{
    background:#d32f2f;
  }
@media(max-width:900px){

header{

flex-direction:column;

gap:15px;

text-align:center;

}

.dashboard{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<header>

<h1>Mr Naths Concept Admin</h1>

<button id="logoutBtn">
Logout
</button>

</header>

<div class="container">

<div class="stats">

<div class="stat-card">
<h3 id="projectCount">0</h3>
<p>Projects</p>
</div>

<div class="stat-card">
<h3 id="messageCount">0</h3>
<p>Messages</p>
</div>

<div class="stat-card">
<h3 id="categoryCount">0</h3>
<p>Categories</p>
</div>

<div class="stat-card">
<h3 id="todayCount">0</h3>
<p>Today's Uploads</p>
</div>

</div>
<div class="dashboard">

    <!-- Project Upload Form -->

    <div class="card">

        <h2>Add New Project</h2>

        <input
            type="text"
            id="title"
            placeholder="Project Title">

        <textarea
            id="description"
            placeholder="Project Description"></textarea>

        <select id="category">

            <option value="Graphic Design">Graphic Design</option>

            <option value="Brand Identity">Brand Identity</option>

            <option value="Logo Design">Logo Design</option>

            <option value="Printing">Printing</option>

            <option value="Social Media Design">Social Media Design</option>

        </select>

        <div id="preview">

            <img
                id="previewImage"
                alt="Project Preview">

            <span id="previewText">
                Image Preview
            </span>

        </div>

        <input
            type="file"
            id="image"
            accept="image/*">

        <button id="uploadBtn">
            Upload Project
        </button>

        <p id="status"></p>

    </div>

    <!-- Uploaded Projects -->

    <div>

        <h2 class="section-title" style="margin-top:0;">
            Uploaded Projects
        </h2>

        <div
            id="gallery"
            class="gallery">

        </div>

    </div>

</div>
<!-- ==========================
     CONTACT MESSAGES
========================== -->

<h2 class="section-title">
    Contact Messages
</h2>

<div class="message-filters">

    <button
        class="filter-btn active"
        data-status="All">
        All
    </button>

    <button
        class="filter-btn"
        data-status="New">
        New
    </button>

    <button
        class="filter-btn"
        data-status="Read">
        Read
    </button>

    <button
        class="filter-btn"
        data-status="Replied">
        Replied
    </button>

</div>

<div id="messages"></div>

<!-- ==========================
     MANAGE SERVICES
========================== -->

<h2 class="section-title">
    Manage Services
</h2>

<div class="card">

    <input
        type="text"
        id="serviceTitle"
        placeholder="Service Title">

    <input
        type="text"
        id="serviceIcon"
        placeholder="Font Awesome Icon (e.g. fa-palette)">

    <textarea
        id="serviceDescription"
        placeholder="Service Description"></textarea>

    <button id="saveService">
        Save Service
    </button>

</div>

<div
    id="servicesList"
    class="gallery">

</div>
<!-- ==========================
     TESTIMONIALS
========================== -->

<h2 class="section-title">
    Manage Testimonials
</h2>

<div class="card">

    <input
        type="text"
        id="clientName"
        placeholder="Client Name">

    <input
        type="text"
        id="clientCompany"
        placeholder="Company (Optional)">

    <textarea
        id="clientMessage"
        placeholder="Client Testimonial"></textarea>

    <select id="clientRating">

        <option value="5">★★★★★ (5 Stars)</option>
        <option value="4">★★★★☆ (4 Stars)</option>
        <option value="3">★★★☆☆ (3 Stars)</option>
        <option value="2">★★☆☆☆ (2 Stars)</option>
        <option value="1">★☆☆☆☆ (1 Star)</option>

    </select>

    <button id="saveTestimonial">
        Save Testimonial
    </button>

</div>

<div
    id="testimonialsList"
    class="gallery">
</div>

</div>

<script
    type="module"
    src="./admin.js">
</script>

</body>
</html>
