<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Mr Naths Concept</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#5B1020,#8B1E3F);
}

.login-box{
background:#fff;
padding:40px;
width:360px;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,.25);
}

h2{
text-align:center;
margin-bottom:25px;
color:#5B1020;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#5B1020;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#7d1934;
}

#error{
margin-top:15px;
color:red;
text-align:center;
}
</style>

</head>

<body>

<div class="login-box">

<h2>Administrator Login</h2>

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">

Login

</button>

<p id="error"></p>

</div>

<script type="module">

import supabase from "./supabase.js";

const loginBtn=document.getElementById("loginBtn");

loginBtn.addEventListener("click",async()=>{

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

const {error}=await supabase.auth.signInWithPassword({

email,
password

});

if(error){

document.getElementById("error").textContent=error.message;

return;

}

window.location.href="admin.html";

});

</script>

</body>
</html>
